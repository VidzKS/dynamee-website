<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accelerating Portfolio Value Creation</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; /* Sets background to crisp white */
         color: #052dcd; /* Sets text to vivid blue- same as logo */
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header with Logo */
       /*.header {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
        }*/
           .header {
            position: fixed; /* Lock it relative to the screen */
            top: 15px;       /* Pushes it tightly to the top edge */
            left: 15px;      /* Pushes it tightly to the left edge */
            z-index: 100px;   /* Ensures it stays on top of everything */
            margin: 0;       /* Removes any accidental default spacing */
            padding: 0;      /* Removes any accidental inner spacing */
        }

        .logo-link {
            display: inline-block;
        }

        .logo-image {
            height: 80px; /* Adjust this height to make your logo bigger or smaller */
            width: auto;  /* Keeps the logo from stretching */
            display: block;
        }


        /* Main Content Container */
        .hero-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Main Heading */
        .main-heading {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: #052dcd; /* blue from the logo */
        }

        /* Sub-heading */
        .sub-heading {
            font-size: 1.25rem;
            font-weight: 400;
            line-height: 1.6;
            color: #1a1a1a; /* black */
            max-width: 800px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .main-heading {
                font-size: 2.5rem;
            }
            .sub-heading {
                font-size: 1.1rem;
            }
            .header {
                top: 1.5rem;
                left: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Logo / Top Left Brand -->
    <header class="header">
        <a href="#" class="logo-link">
            <img src="DYNAMEE_logo7.png" alt="Dynamee Logo" class="logo-image">
        </a>
    </header>

    <!-- Hero Section -->
    <main class="hero-container">
        <h1 class="main-heading">Accelerating Portfolio Value Creation</h1>
        <p class="sub-heading">Helping private equity firms unlock value through hands-on CFO leadership, M&A execution and operational discipline.</p>
    </main>

</body>
</html>
